name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run typecheck:test
      - run: npm test
      - run: npm run docs:sync-cli
      - name: Ensure README CLI block matches src/cli-reference.ts
        run: git diff --exit-code README.md
      - run: npm run build:all
      - run: npm run test:mcp
