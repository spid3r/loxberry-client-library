# Dummy plugin for https://github.com/spid3r/loxberry-client-library — automated live tests
# and manual install checks. It does nothing useful; safe to uninstall from Plugin management.
# Folder/name are fixed so tests can find the row; do not reuse for a real plugin.
# icons/icon_*.png are required: stock plugininstall.pl always copies icons/* (missing dir breaks install).

[AUTHOR]
NAME=Thorsten Wolf
EMAIL=thorsten.wolf@gmail.com

[PLUGIN]
VERSION=0.0.1
NAME=loxberryclie2e
FOLDER=loxberryclie2e
TITLE=E2E Client Lib

[AUTOUPDATE]
AUTOMATIC_UPDATES=false

[SYSTEM]
REBOOT=false
LB_MINIMUM=2.0
LB_MAXIMUM=false
ARCHITECTURE=false
CUSTOM_LOGLEVELS=false
INTERFACE=2.0
